all.export /rucio
ofs.authlib libXrdAccSciTokens.so
xrootd.seclib /usr/lib64/libXrdSec.so
sec.protocol /usr/lib64 gsi -dlgpxy:1 -exppxy:=creds -certdir: -cert:/etc/grid-security/xrd/xrdcert.pem -key:/etc/grid-security/xrd/xrdkey.pem
sec.protocol /usr/lib64 ztn -expiry required -maxsz 4k
xrootd.chksum adler32 /usr/local/bin/xrdadler32.sh
xrd.tls /etc/grid-security/xrd/xrdcert.pem /etc/grid-security/xrd/xrdkey.pem
xrd.tlsca certdir /etc/grid-security/certificates/
ofs.tpc autorm fcreds gsi =X509_USER_PROXY pgm /usr/bin/xrdcp --server
xrootd.tls all
